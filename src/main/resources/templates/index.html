<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tracker & Alerts</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <style>
        body {
            background: #f5f6fa;
            font-family: 'Segoe UI', sans-serif;
            animation: fadeIn 0.7s ease-in-out;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
        .navbar-brand img {
            width: 38px;
            margin-right: 8px;
        }
        .card-custom {
            border-radius: 20px;
            border: none;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .card-custom:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 26px rgba(0,0,0,0.12);
        }
        .btn-custom {
            border-radius: 10px;
            padding: 12px;
            font-size: 17px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-custom:hover {
            transform: scale(1.03);
        }
        h2 {
            font-weight: 700;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm py-3">
    <div class="container d-flex align-items-center">

        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="/logo.png" alt="logo">
            <span class="fw-bold fs-4">CryptoTracker</span>
        </a>

        <ul class="nav">
            <li class="nav-item">
                <a class="nav-link fw-semibold" href="/">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-semibold" href="/market">Market</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-semibold" href="/alerts">🔔 Alerts</a>
            </li>
        </ul>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">
    <div class="row">
        <!-- Add Tracker Form -->
        <div class="col-md-5 mb-4">
            <!-- Rate Limit Disclaimer -->
            <div th:if="${topCoins.isEmpty()}" class="alert alert-warning mb-4 shadow-sm border-0" style="border-radius: 15px;">
                <i class="fa-solid fa-triangle-exclamation me-2"></i>
                <strong>Notice:</strong> High server traffic. Coin data may take a moment to appear. Please refresh in 1-2 minutes.
            </div>

            <div class="card card-custom p-4 h-100" style="position: relative;">
                <h3 class="text-center mb-4">
                    <i class="fa-solid fa-magnifying-glass-chart"></i> Track Specific Coins
                </h3>

                <form action="/track" method="post">
                    <label class="mb-2 fw-bold">Select Currency</label>
                    <select name="currency" class="form-select form-select-lg mb-3">
                        <option value="usd" th:selected="${currency == 'usd'}">🇺🇸 USD ($)</option>
                        <option value="inr" th:selected="${currency == 'inr'}">🇮🇳 INR (₹)</option>
                        <option value="eur" th:selected="${currency == 'eur'}">🇪🇺 EUR (€)</option>
                        <option value="gbp" th:selected="${currency == 'gbp'}">🇬🇧 GBP (£)</option>
                        <option value="jpy" th:selected="${currency == 'jpy'}">🇯🇵 JPY (¥)</option>
                        <option value="aud" th:selected="${currency == 'aud'}">🇦🇺 AUD (A$)</option>
                        <option value="cad" th:selected="${currency == 'cad'}">🇨🇦 CAD (C$)</option>
                        <option value="chf" th:selected="${currency == 'chf'}">🇨🇭 CHF (CHF)</option>
                        <option value="cny" th:selected="${currency == 'cny'}">🇨🇳 CNY (¥)</option>
                        <option value="sek" th:selected="${currency == 'sek'}">🇸🇪 SEK (kr)</option>
                        <option value="nzd" th:selected="${currency == 'nzd'}">🇳🇿 NZD (NZ$)</option>
                        <option value="mxn" th:selected="${currency == 'mxn'}">🇲🇽 MXN ($)</option>
                        <option value="sgd" th:selected="${currency == 'sgd'}">🇸🇬 SGD (S$)</option>
                        <option value="hkd" th:selected="${currency == 'hkd'}">🇭🇰 HKD (HK$)</option>
                        <option value="nok" th:selected="${currency == 'nok'}">🇳🇴 NOK (kr)</option>
                        <option value="krw" th:selected="${currency == 'krw'}">🇰🇷 KRW (₩)</option>
                    </select>

                    <label class="mb-2 fw-bold">Enter Crypto Coins</label>
                    <div style="position: relative;">
                        <input type="text"
                               id="cryptoInput"
                               name="coins"
                               class="form-control form-control-lg"
                               placeholder="Ex: bitcoin, ethereum"
                               autocomplete="off"
                               required>
                        <ul id="suggestions" class="list-group position-absolute w-100" style="z-index: 1000; display: none; max-height: 250px; overflow-y: auto;">
                            <!-- JS will populate suggestions here -->
                        </ul>
                    </div>

                    <button type="submit" class="btn btn-primary btn-custom w-100 mt-4">
                        Track Prices <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Top 10 Coins -->
        <div class="col-md-7">
            <div class="card card-custom p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="m-0"><i class="fa-solid fa-fire text-danger"></i> Top 10 by Market Cap</h3>
                    
                    <form action="/" method="get" class="d-flex">
                        <select name="currency" class="form-select form-select-sm me-2" onchange="this.form.submit()">
                            <option value="usd" th:selected="${currency == 'usd'}">USD</option>
                            <option value="inr" th:selected="${currency == 'inr'}">INR</option>
                            <option value="eur" th:selected="${currency == 'eur'}">EUR</option>
                            <option value="gbp" th:selected="${currency == 'gbp'}">GBP</option>
                            <option value="jpy" th:selected="${currency == 'jpy'}">JPY</option>
                            <option value="aud" th:selected="${currency == 'aud'}">AUD</option>
                            <option value="cad" th:selected="${currency == 'cad'}">CAD</option>
                            <option value="chf" th:selected="${currency == 'chf'}">CHF</option>
                            <option value="cny" th:selected="${currency == 'cny'}">CNY</option>
                            <option value="sek" th:selected="${currency == 'sek'}">SEK</option>
                            <option value="nzd" th:selected="${currency == 'nzd'}">NZD</option>
                            <option value="mxn" th:selected="${currency == 'mxn'}">MXN</option>
                            <option value="sgd" th:selected="${currency == 'sgd'}">SGD</option>
                            <option value="hkd" th:selected="${currency == 'hkd'}">HKD</option>
                            <option value="nok" th:selected="${currency == 'nok'}">NOK</option>
                            <option value="krw" th:selected="${currency == 'krw'}">KRW</option>
                        </select>
                    </form>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Coin</th>
                            <th>Price</th>
                            <th>24h Change</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="coin : ${topCoins}">
                            <td>
                                <img th:if="${coin.imageUrl != null and coin.imageUrl != ''}" th:src="${coin.imageUrl}" width="30" height="30" class="me-2 rounded-circle" alt="logo">
                                <span class="fw-bold text-capitalize" th:text="${coin.name}">Name</span>
                            </td>
                            <td class="fw-semibold">
                                <span th:if="${currency == 'usd'}">$</span>
                                <span th:if="${currency == 'inr'}">₹</span>
                                <span th:if="${currency == 'eur'}">€</span>
                                <span th:if="${currency == 'gbp'}">£</span>
                                <span th:if="${currency == 'jpy' or currency == 'cny'}">¥</span>
                                <span th:if="${currency == 'aud'}">A$</span>
                                <span th:if="${currency == 'cad'}">C$</span>
                                <span th:if="${currency == 'chf'}">CHF</span>
                                <span th:if="${currency == 'sek' or currency == 'nok'}">kr</span>
                                <span th:if="${currency == 'nzd'}">NZ$</span>
                                <span th:if="${currency == 'mxn'}">$</span>
                                <span th:if="${currency == 'sgd'}">S$</span>
                                <span th:if="${currency == 'hkd'}">HK$</span>
                                <span th:if="${currency == 'krw'}">₩</span>
                                <span th:text="${coin.price}">Price</span>
                            </td>
                            <td th:class="${coin.change24h >= 0 ? 'text-success fw-bold' : 'text-danger fw-bold'}">
                                <i th:class="${coin.change24h >= 0 ? 'fa-solid fa-arrow-trend-up' : 'fa-solid fa-arrow-trend-down'}"></i>
                                <span th:text="${#numbers.formatDecimal(coin.change24h, 1, 2)} + '%'">0.00%</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('cryptoInput');
    const suggestions = document.getElementById('suggestions');
    let timeout = null;

    input.addEventListener('input', function() {
        clearTimeout(timeout);
        const query = this.value.trim();
        
        // Handle comma separated values (only search the last one)
        const parts = query.split(',');
        const lastPart = parts[parts.length - 1].trim();

        if (lastPart.length < 2) {
            suggestions.style.display = 'none';
            return;
        }

        timeout = setTimeout(() => {
            fetch(`https://api.coingecko.com/api/v3/search?query=${lastPart}`)
                .then(res => res.json())
                .then(data => {
                    suggestions.innerHTML = '';
                    if(data.coins && data.coins.length > 0) {
                        data.coins.slice(0, 6).forEach(coin => {
                            const li = document.createElement('li');
                            li.className = 'list-group-item list-group-item-action d-flex align-items-center';
                            li.style.cursor = 'pointer';
                            li.innerHTML = `<img src="${coin.thumb}" width="20" height="20" class="me-2"> <strong>${coin.name}</strong> <span class="ms-1 text-muted">(${coin.id})</span>`;
                            
                            li.addEventListener('click', () => {
                                parts[parts.length - 1] = ' ' + coin.id;
                                input.value = parts.join(',').trim();
                                suggestions.style.display = 'none';
                                input.focus();
                            });
                            suggestions.appendChild(li);
                        });
                        suggestions.style.display = 'block';
                    } else {
                        suggestions.style.display = 'none';
                    }
                })
                .catch(err => console.error(err));
        }, 500); 
    });

    // Hide suggestions when clicking outside
    document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !suggestions.contains(e.target)) {
            suggestions.style.display = 'none';
        }
    });
</script>

</body>
</html>
