<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Market - Crypto Tracker</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body {
            background: #f5f6fa;
            font-family: 'Segoe UI', sans-serif;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
        .navbar-brand img {
            width: 38px;
            margin-right: 8px;
        }
        .card-custom {
            border-radius: 20px;
            border: none;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }
        .market-rank {
            color: #8c8c8c;
            font-size: 0.9rem;
            width: 40px;
            display: inline-block;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm py-3">
    <div class="container d-flex align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="/logo.png" alt="logo">
            <span class="fw-bold fs-4">CryptoTracker</span>
        </a>
        <ul class="nav">
            <li class="nav-item">
                <a class="nav-link fw-semibold" href="/">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-bold text-primary" href="/market">Market</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-semibold" href="/alerts">🔔 Alerts</a>
            </li>
        </ul>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5 mb-5">
    <div class="card card-custom p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0 fw-bold"><i class="fa-solid fa-globe text-primary"></i> Top 100 Crypto Market</h2>
            
            <form action="/market" method="get" class="d-flex">
                <select name="currency" class="form-select form-select-md" onchange="this.form.submit()">
                    <option value="usd" th:selected="${currency == 'usd'}">🇺🇸 USD</option>
                    <option value="inr" th:selected="${currency == 'inr'}">🇮🇳 INR</option>
                    <option value="eur" th:selected="${currency == 'eur'}">🇪🇺 EUR</option>
                    <option value="gbp" th:selected="${currency == 'gbp'}">🇬🇧 GBP</option>
                    <option value="jpy" th:selected="${currency == 'jpy'}">🇯🇵 JPY</option>
                    <option value="aud" th:selected="${currency == 'aud'}">🇦🇺 AUD</option>
                    <option value="cad" th:selected="${currency == 'cad'}">🇨🇦 CAD</option>
                    <option value="chf" th:selected="${currency == 'chf'}">🇨🇭 CHF</option>
                    <option value="cny" th:selected="${currency == 'cny'}">🇨🇳 CNY</option>
                    <option value="sek" th:selected="${currency == 'sek'}">🇸🇪 SEK</option>
                    <option value="nzd" th:selected="${currency == 'nzd'}">🇳🇿 NZD</option>
                    <option value="mxn" th:selected="${currency == 'mxn'}">🇲🇽 MXN</option>
                    <option value="sgd" th:selected="${currency == 'sgd'}">🇸🇬 SGD</option>
                    <option value="hkd" th:selected="${currency == 'hkd'}">🇭🇰 HKD</option>
                    <option value="nok" th:selected="${currency == 'nok'}">🇳🇴 NOK</option>
                    <option value="krw" th:selected="${currency == 'krw'}">🇰🇷 KRW</option>
                </select>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle border-top">
                <thead class="table-light">
                <tr>
                    <th class="py-3">#</th>
                    <th class="py-3">Coin</th>
                    <th class="py-3 text-end">Price</th>
                    <th class="py-3 text-end">24h Change</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="coin, status : ${marketCoins}">
                    <td class="text-muted fw-bold" th:text="${status.index + 1}">1</td>
                    <td>
                        <img th:if="${coin.imageUrl != null and coin.imageUrl != ''}" th:src="${coin.imageUrl}" width="35" height="35" class="me-3 rounded-circle shadow-sm" alt="logo">
                        <span class="fw-bold text-capitalize fs-5" th:text="${coin.name}">Name</span>
                        <span class="text-muted ms-2 text-uppercase fs-6" th:text="${coin.id}"></span>
                    </td>
                    <td class="fw-bold text-end fs-5">
                        <span th:if="${currency == 'usd'}">$</span>
                        <span th:if="${currency == 'inr'}">₹</span>
                        <span th:if="${currency == 'eur'}">€</span>
                        <span th:if="${currency == 'gbp'}">£</span>
                        <span th:if="${currency == 'jpy' or currency == 'cny'}">¥</span>
                        <span th:if="${currency == 'aud'}">A$</span>
                        <span th:if="${currency == 'cad'}">C$</span>
                        <span th:if="${currency == 'chf'}">CHF</span>
                        <span th:if="${currency == 'sek' or currency == 'nok'}">kr</span>
                        <span th:if="${currency == 'nzd'}">NZ$</span>
                        <span th:if="${currency == 'mxn'}">$</span>
                        <span th:if="${currency == 'sgd'}">S$</span>
                        <span th:if="${currency == 'hkd'}">HK$</span>
                        <span th:if="${currency == 'krw'}">₩</span>
                        <span th:text="${coin.price}">Price</span>
                    </td>
                    <td class="text-end fw-bold fs-5" th:classappend="${coin.change24h >= 0 ? 'text-success' : 'text-danger'}">
                        <i th:class="${coin.change24h >= 0 ? 'fa-solid fa-arrow-trend-up' : 'fa-solid fa-arrow-trend-down'}"></i>
                        <span th:text="${#numbers.formatDecimal(coin.change24h, 1, 2)} + '%'">0.00%</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
